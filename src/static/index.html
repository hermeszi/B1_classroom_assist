<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>class_assist</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen py-10 px-4">
  <div class="max-w-2xl mx-auto space-y-6">

    <h1 class="text-2xl font-bold text-indigo-700">class_assist</h1>

    <!-- Student picker -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 space-y-2">
      <label class="block text-sm font-semibold text-gray-600 uppercase tracking-wide">
        Students <span class="font-normal text-gray-400">(hold Ctrl/⌘ for multiple)</span>
      </label>
      <select id="student-select" multiple size="4"
        class="w-full rounded-lg border border-gray-300 text-sm p-2 focus:outline-none focus:ring-2 focus:ring-indigo-400">
      </select>
    </div>

    <!-- Add student form -->
    <details id="add-student-details" class="bg-white rounded-xl shadow-sm border border-gray-200 group">
      <summary class="flex items-center justify-between px-5 py-3 cursor-pointer select-none list-none hover:bg-gray-50 rounded-xl">
        <span class="text-sm font-semibold text-indigo-600">+ Add student</span>
        <span class="text-gray-400 text-xs inline-block transition-transform group-open:rotate-180">▾</span>
      </summary>
      <div class="px-5 pb-5 pt-3 border-t border-gray-100 space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <div class="col-span-2 space-y-1">
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide">Name <span class="text-red-400">*</span></label>
            <input id="ns-name" type="text" placeholder="First / preferred name"
              class="w-full rounded-lg border border-gray-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          </div>
          <div class="space-y-1">
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide">Age</label>
            <input id="ns-age" type="number" min="5" max="25" placeholder="e.g. 11"
              class="w-full rounded-lg border border-gray-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          </div>
          <div class="space-y-1">
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide">Level</label>
            <input id="ns-level" type="text" placeholder="e.g. Scratch L1"
              class="w-full rounded-lg border border-gray-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          </div>
          <div class="space-y-1">
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide">Scratch username</label>
            <input id="ns-scratch" type="text" placeholder="username only"
              class="w-full rounded-lg border border-gray-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          </div>
          <div class="space-y-1">
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide">Parent email</label>
            <input id="ns-email" type="email" placeholder="parent@example.com"
              class="w-full rounded-lg border border-gray-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          </div>
          <div class="col-span-2 space-y-1">
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide">Profile notes</label>
            <textarea id="ns-notes" rows="2" placeholder="Siblings, learning style, goals…"
              class="w-full rounded-lg border border-gray-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-y"></textarea>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <button id="btn-add-student"
            class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-5 py-2 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
            Add student
          </button>
          <span id="add-student-error" hidden class="text-sm text-red-600"></span>
        </div>
      </div>
    </details>

    <!-- History panel (populated by JS on student selection) -->
    <div id="history-panel" hidden class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 space-y-3">
      <h2 id="history-heading" class="text-sm font-semibold text-gray-600 uppercase tracking-wide"></h2>
      <div id="history-list" class="space-y-2 text-sm text-gray-700"></div>
    </div>

    <!-- Lesson inputs -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 space-y-4">
      <div class="flex gap-4">
        <div class="flex-1 space-y-1">
          <label for="worksheet" class="block text-sm font-semibold text-gray-600 uppercase tracking-wide">Worksheet</label>
          <input id="worksheet" type="text" placeholder="e.g. Scratch Dino Run"
            class="w-full rounded-lg border border-gray-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>
        <div class="space-y-1">
          <label for="lesson-date" class="block text-sm font-semibold text-gray-600 uppercase tracking-wide">Date</label>
          <input id="lesson-date" type="date"
            class="rounded-lg border border-gray-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>
      </div>
      <div class="space-y-1">
        <div class="flex items-center justify-between">
          <label for="notes" class="block text-sm font-semibold text-gray-600 uppercase tracking-wide">Notes</label>
          <button id="btn-mic" title="Dictate notes"
            class="flex items-center gap-1.5 border border-gray-300 hover:bg-gray-50 text-gray-600 text-xs font-semibold px-3 py-1 rounded-lg transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V20H9v2h6v-2h-2v-2.07A7 7 0 0 0 19 11h-2z"/>
            </svg>
            <span id="mic-label">Mic</span>
          </button>
        </div>
        <textarea id="notes" rows="4" placeholder="Rough bullet notes from today's lesson…"
          class="w-full rounded-lg border border-gray-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-y"></textarea>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex items-center gap-3">
      <button id="btn-generate"
        class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-5 py-2 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
        Generate
      </button>
      <span id="loading" hidden class="text-sm text-gray-500 animate-pulse">Generating…</span>
    </div>

    <!-- Error -->
    <div id="error-msg" hidden
      class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3"></div>

    <!-- Results -->
    <div id="results" hidden class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 space-y-4">
      <h2 class="text-sm font-semibold text-gray-600 uppercase tracking-wide">Generated report — edit before saving</h2>

      <div class="space-y-1">
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide">Lesson summary</label>
        <textarea id="field-lesson-summary" rows="6"
          class="w-full rounded-lg border border-gray-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-y"></textarea>
      </div>

      <div class="space-y-1">
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide">Skills practised <span class="font-normal text-gray-400">(comma-separated)</span></label>
        <textarea id="field-skills" rows="2"
          class="w-full rounded-lg border border-gray-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-y"></textarea>
      </div>

      <div class="space-y-1">
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide">Next lesson</label>
        <textarea id="field-next-lesson" rows="2"
          class="w-full rounded-lg border border-gray-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-y"></textarea>
      </div>

      <div class="space-y-1">
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide">Internal handover notes</label>
        <textarea id="field-internal-notes" rows="3"
          class="w-full rounded-lg border border-gray-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-y"></textarea>
      </div>

      <div class="flex items-center gap-3 pt-1">
        <button id="btn-save"
          class="bg-green-600 hover:bg-green-700 text-white text-sm font-semibold px-5 py-2 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
          Save
        </button>
        <button id="btn-copy"
          class="border border-gray-300 hover:bg-gray-50 text-gray-700 text-sm font-semibold px-5 py-2 rounded-lg transition">
          Copy Summary
        </button>
        <span id="save-confirm" hidden class="text-sm text-green-600 font-medium">Saved!</span>
      </div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
